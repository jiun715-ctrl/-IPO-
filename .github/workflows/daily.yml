name: Monthly IPO Schedule

on:
  # 월간 배치 — 외부 cron (cron-job.org) 으로 KST 매월 1일 08:00 트리거
  # GitHub 내장 cron은 UTC 기준이라 월 경계 실수가 잦아서 사용하지 않음
  workflow_dispatch:

permissions:
  contents: write  # snapshot.json 커밋을 위해 필요

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily job
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_NH_DM_USER_IDS: ${{ secrets.SLACK_NH_DM_USER_IDS }}
        run: python main.py

      - name: Commit snapshot if changed
        run: |
          if [[ -n "$(git status --porcelain snapshot.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add snapshot.json
            git commit -m "chore: update snapshot $(date -u +%Y-%m-%d)"
            git push
          else
            echo "snapshot unchanged — nothing to commit"
          fi
